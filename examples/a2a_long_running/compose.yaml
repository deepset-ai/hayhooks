services:
  redis:
    image: redis:7.4-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory-policy
      - noeviction
    ports:
      - "6379:6379"
    volumes:
      - durable-a2a-redis:/data

volumes:
  durable-a2a-redis:
