name: PyPI Release

on:
  push:
    tags:
      - "v[0-9].[0-9]+.[0-9]+*"

env:
  HATCH_VERSION: "1.16.5"

jobs:
  release-on-pypi:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Install Hatch
        run: pip install hatch==${{ env.HATCH_VERSION }}

      - name: Build
        run: hatch build

      - name: Verify every Redis transition script is packaged
        run: python -c 'import glob,pathlib,zipfile; wheel=max(glob.glob("dist/*.whl")); expected={p.name for p in pathlib.Path("src/hayhooks/redis_scripts").glob("*.lua")}; assert expected, "source Redis script inventory is empty"; archive=zipfile.ZipFile(wheel); actual={pathlib.PurePosixPath(name).name for name in archive.namelist() if name.startswith("hayhooks/redis_scripts/") and name.endswith(".lua")}; assert actual == expected, (expected, actual)'

      - name: Publish on PyPi
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
