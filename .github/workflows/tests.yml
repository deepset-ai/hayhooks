name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

env:
  HATCH_VERSION: "1.16.5"
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

permissions:
  contents: read
  pull-requests: read

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Hatch
        run: pip install hatch==${{ env.HATCH_VERSION }}

      - name: Run tests and generate coverage report
        run: hatch run test:all-cov

  # The `tests` job above is the Haystack v2 environment (the hatch test env pins haystack-ai<3).
  # This job installs the Haystack v3 pre-release so we keep both v2 and v3 green.
  tests-haystack-v3:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:6.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 20
    env:
      HAYHOOKS_TEST_REDIS_URL: redis://127.0.0.1:6379/15
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Redis restart-test binary
        run: |
          sudo apt-get update
          sudo apt-get install --yes redis-server

      - name: Install project with the Haystack v3 pre-release
        run: |
          pip install -e ".[mcp,a2a]" pytest pytest-asyncio pytest-cov pytest-mock qdrant-haystack trafilatura ty
          pip install --pre --upgrade "haystack-ai>=3.0.0.dev0"
          python -c "import haystack; print('haystack', haystack.__version__)"

      - name: Run tests
        run: pytest -vv tests

      - name: Ty - check types (Haystack v3)
        run: ty check src/hayhooks

  linting:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.10"  # needed to check MCP features with mypy

      - name: Install Hatch
        run: pip install hatch==${{ env.HATCH_VERSION }}

      - name: Ruff - check format and linting
        run: hatch run fmt-check

      - name: Ty - check types
        run: hatch run test:types

      - name: Build documentation in strict mode
        run: hatch run docs:build --strict

      - name: Verify every Redis transition script is packaged
        run: |
          hatch build -t wheel
          python -c 'import glob,pathlib,zipfile; wheel=max(glob.glob("dist/*.whl")); expected={p.name for p in pathlib.Path("src/hayhooks/redis_scripts").glob("*.lua")}; assert expected, "source Redis script inventory is empty"; archive=zipfile.ZipFile(wheel); actual={pathlib.PurePosixPath(name).name for name in archive.namelist() if name.startswith("hayhooks/redis_scripts/") and name.endswith(".lua")}; assert actual == expected, (expected, actual)'

  dashboard-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050 # v3
        id: changes
        with:
          filters: |
            dashboard:
              - "dashboard/**"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        if: steps.changes.outputs.dashboard == 'true'
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        if: steps.changes.outputs.dashboard == 'true'
        working-directory: dashboard
        run: npm ci

      - name: Run dashboard frontend tests
        if: steps.changes.outputs.dashboard == 'true'
        working-directory: dashboard
        run: npm run test
